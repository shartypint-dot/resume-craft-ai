name: resume_craft_ai
description: ResumeCraft AI - Premium AI-Powered Resume Builder & Career Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_analytics: ^11.2.1
  firebase_messaging: ^15.1.0
  firebase_crashlytics: ^4.1.1
  firebase_remote_config: ^5.1.1

  # Google Sign In
  google_sign_in: ^6.2.1

  # Apple Sign In
  sign_in_with_apple: ^6.1.2

  # LinkedIn Sign In
  flutter_web_auth_2: ^4.0.0

  # HTTP & Networking
  http: ^1.2.2
  dio: ^5.6.0
  retrofit: ^4.4.1

  # Local Storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  step_progress_indicator: ^1.0.2
  carousel_slider: ^5.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0
  timeline_tile: ^2.0.0
  flutter_rating_bar: ^4.0.1
  country_picker: ^2.0.26
  country_flags: ^3.0.0

  # Forms & Validation
  reactive_forms: ^17.0.1
  flutter_form_builder: ^10.0.0
  form_builder_validators: ^11.0.0
  intl_phone_field: ^3.2.0

  # File Handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  open_filex: ^4.5.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2
  syncfusion_flutter_pdf: ^28.1.38
  syncfusion_flutter_pdfviewer: ^28.1.38

  # Document Parsing
  archive: ^3.6.1
  xml: ^6.5.0

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  # Subscription & Payments
  purchases_flutter: ^8.0.0
  flutter_stripe: ^11.1.0

  # Sharing
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  clipboard: ^0.1.3

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Image Processing
  image: ^4.2.0
  image_cropper: ^9.0.0
  flutter_image_compress: ^2.3.0

  # Animations & Effects
  glass_kit: ^3.0.0
  blur: ^3.1.0
  glassmorphism: ^3.0.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.4.2
  intl: ^0.20.0
  timeago: ^3.7.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  device_info_plus: ^11.5.0
  wakelock_plus: ^1.2.5

  # Code Generation Support
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Markdown
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2

  # In-App Review
  in_app_review: ^2.0.9

  # Deep Linking
  app_links: ^6.3.2

  # Biometrics
  local_auth: ^2.3.0

  # Charts
  syncfusion_flutter_charts: ^28.1.38

  # Social Share
  social_share: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  retrofit_generator: ^9.1.6
  mockito: ^5.4.4
  bloc_test: ^9.1.7
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/templates/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
